<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI API Tester</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
        input, select { margin: 5px; padding: 5px; }
        button { padding: 5px 10px; }
    </style>
</head>
<body>
    <h1>AI Chat API Tester</h1>
    <div>
        <select id="model">
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
            <option value="claude-3">Claude-3</option>
            <option value="gemini">Gemini</option>
        </select>
        <input type="text" id="session" placeholder="Session ID" value="default">
        <label><input type="checkbox" id="stream"> Stream</label>
    </div>
    <div>
        <input type="text" id="message" placeholder="Enter your message" style="width: 300px;">
        <button onclick="sendMessage()">Send</button>
        <button onclick="clearChat()">Clear Chat</button>
    </div>
    <div id="chat"></div>

    <script>
        const chatDiv = document.getElementById('chat');

        async function sendMessage() {
            const model = document.getElementById('model').value;
            const message = document.getElementById('message').value;
            const session = document.getElementById('session').value;
            const stream = document.getElementById('stream').checked;

            if (!message) return;

            appendMessage('You', message);

            const payload = {
                model: model,
                messages: [{role: 'user', content: message}],
                session_id: session,
                stream: stream
            };

            if (stream) {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data.startsWith('error:')) {
                                appendMessage('Error', data.slice(6));
                            } else {
                                appendMessage('AI', data);
                            }
                        }
                    }
                }
            } else {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.error) {
                    appendMessage('Error', data.error);
                } else {
                    appendMessage('AI', data.response);
                }
            }

            document.getElementById('message').value = '';
        }

        function appendMessage(sender, text) {
            const p = document.createElement('p');
            p.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatDiv.appendChild(p);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function clearChat() {
            chatDiv.innerHTML = '';
        }

        // Load models on page load
        window.onload = async () => {
            const response = await fetch('/api/models');
            const data = await response.json();
            const select = document.getElementById('model');
            select.innerHTML = '';
            for (const provider in data.models) {
                for (const model of data.models[provider]) {
                    const option = document.createElement('option');
                    option.value = model;
                    option.text = `${provider}: ${model}`;
                    select.appendChild(option);
                }
            }
        };
    </script>
</body>
</html>
